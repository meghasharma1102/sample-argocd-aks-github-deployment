replicaCount: 1

image:
  repository: acrprivatedemo01.azurecr.io/sample-node-app-argocd
  tag: v1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

config:
  APP_NAME: "Sample Node App - Argo CD"
  APP_MESSAGE: "Application deployed to private AKS using Argo CD GitOps from GitHub."
  STORAGE_PATH: "/app/data"

podSecurityContext:
  fsGroup: 2000
  fsGroupChangePolicy: OnRootMismatch

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70

persistence:
  enabled: false
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClass: managed-csi

ingress:
  enabled: false
  className: nginx
  host: "sample-node-app-argocd.internal"
  path: /
  pathType: Prefix
  annotations: {}
