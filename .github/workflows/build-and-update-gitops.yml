name: Build Image and Update Argo CD

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/build-and-update-gitops.yml
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  ACR_NAME: acrprivatedemo01
  ACR_LOGIN_SERVER: acrprivatedemo01.azurecr.io
  IMAGE_REPOSITORY: sample-node-app-argocd
  IMAGE_TAG: ${{ github.run_number }}
  VALUES_FILE: argocd/values-argocd.yaml

defaults:
  run:
    shell: pwsh

jobs:
  build-and-update:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Docker is available
        run: docker version

      - name: Log in to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build and push image from self-hosted runner
        working-directory: app
        run: |
          IMAGE_URI="${ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker build --tag "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Update image tag in Argo CD values
        run: |
          sed -i -E "s|^([[:space:]]*tag:).*|\1 ${IMAGE_TAG}|" "$VALUES_FILE"

      - name: Commit and push values file
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "$VALUES_FILE"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Argo CD image tag to ${IMAGE_TAG}"
          git push
