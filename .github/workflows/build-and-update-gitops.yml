name: Build Image and Update Argo CD

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/build-and-update-gitops.yml
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  ACR_NAME: acrprivatedemo01
  IMAGE_REPOSITORY: sample-node-app-argocd
  IMAGE_TAG: ${{ github.run_number }}
  VALUES_FILE: argocd/values-argocd.yaml

defaults:
  run:
    shell: pwsh

jobs:
  build-and-update:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image in ACR
        working-directory: app
        run: |
          az acr build `
            --registry $env:ACR_NAME `
            --image "$env:IMAGE_REPOSITORY:$env:IMAGE_TAG" `
            --file Dockerfile `
            .

      - name: Update image tag in Argo CD values
        run: |
          (Get-Content $env:VALUES_FILE) `
            -replace '^\s*tag:.*$', "  tag: $env:IMAGE_TAG" `
            | Set-Content $env:VALUES_FILE

      - name: Commit and push values file
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add $env:VALUES_FILE

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit"
            exit 0
          }

          git commit -m "Update Argo CD image tag to $env:IMAGE_TAG"
          git push