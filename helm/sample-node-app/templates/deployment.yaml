apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sample-node-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sample-node-app.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sample-node-app.fullname" . }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      {{- end }}
      containers:
        - name: sample-node-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef:
                name: {{ include "sample-node-app.fullname" . }}-config
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: app-data
              mountPath: {{ .Values.config.STORAGE_PATH }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
{{ toYaml .Values.resources | indent 12 }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: {{ include "sample-node-app.fullname" . }}-pvc
      {{- end }}
